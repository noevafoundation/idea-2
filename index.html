<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>idea 2</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font: 16px/1.5 system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1a1a2e, #0a0a14);
      color: #e8e8f0;
      display: grid;
      place-items: center;
      min-height: 100dvh;
    }
    main { text-align: center; padding: 2rem; }
    h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin: 0 0 .5rem; letter-spacing: -.02em; }
    p { opacity: .7; margin: 0; }
  </style>
</head>
<body>
  <main>
    <h1>idea 2</h1>
    <p>ready to build.</p>
  </main>
</body>
</html>
